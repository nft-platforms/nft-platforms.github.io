<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFT Platforms - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for NFT Platforms DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://nft-platforms.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7F7F4;
  --bg-soft:#FCFCFA;
  --surface:#FFFFFF;
  --surface-soft:#F1F1EE;
  --ink:#15151A;
  --muted:#666872;
  --faint:#9B9DA6;
  --line:rgba(21,21,26,.10);
  --line-strong:rgba(21,21,26,.16);
  --accent:#6366F1;
  --accent-ink:#FFFFFF;
  --accent-soft:rgba(99,102,241,.12);
  --shadow:0 28px 70px -42px rgba(21,21,26,.42);
  --max:1088px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  background:
    radial-gradient(circle at 50% -18%, rgba(99,102,241,.14), transparent 36rem),
    linear-gradient(180deg, var(--bg-soft), var(--bg));
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  display:grid;
  grid-template-rows:auto 1fr auto;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
p,h1{margin:0}

.topbar{
  width:min(var(--max), calc(100% - 48px));
  margin:0 auto;
  padding:18px 0;
  display:flex;
  align-items:center;
  gap:22px;
}

.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  font-size:1rem;
  font-weight:760;
  letter-spacing:0;
  white-space:nowrap;
}

.brand img{
  width:30px;
  height:30px;
  border-radius:9px;
  box-shadow:0 1px 0 rgba(255,255,255,.82) inset, 0 0 0 1px var(--line);
}

.nav{
  display:flex;
  align-items:center;
  gap:24px;
}

.nav a{
  color:var(--muted);
  font-size:.93rem;
  font-weight:560;
  letter-spacing:0;
  transition:color .16s ease;
}

.nav a:hover{color:var(--ink)}
.spacer{flex:1}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 17px;
  color:var(--ink);
  background:rgba(255,255,255,.58);
  border:1px solid var(--line-strong);
  border-radius:999px;
  box-shadow:0 1px 0 rgba(255,255,255,.78) inset;
  font-size:.92rem;
  font-weight:720;
  white-space:nowrap;
  transition:transform .14s ease, border-color .16s ease, background .16s ease;
}

.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(99,102,241,.42);
  background:#FFFFFF;
}

.stage{
  width:min(var(--max), calc(100% - 48px));
  margin:0 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px 0 4px;
}

.hero{display:contents}

h1{
  font-size:4.25rem;
  line-height:1.02;
  font-weight:820;
  letter-spacing:0;
}

.sub{
  width:min(100%, 48ch);
  margin-top:16px;
  color:var(--muted);
  font-size:1.13rem;
  line-height:1.62;
}

.sub strong{
  color:var(--ink);
  font-weight:760;
}

.app-card{
  width:min(430px, 100%);
  margin-top:30px;
  padding:18px;
  background:rgba(255,255,255,.86);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow), 0 1px 0 rgba(255,255,255,.88) inset;
  backdrop-filter:blur(10px);
}

.nft-tile{
  width:100%;
  aspect-ratio:1 / 1;
  max-height:214px;
  border-radius:18px;
  border:1px solid var(--line);
  background:
    linear-gradient(135deg, transparent 0 58%, rgba(99,102,241,.12) 58% 100%),
    radial-gradient(circle at 32% 28%, rgba(255,255,255,.96) 0 18%, transparent 19%),
    linear-gradient(145deg, #F6F6F3, #EDEDEA);
  display:grid;
  place-items:center;
  overflow:hidden;
}

.nft-tile span{
  width:42%;
  aspect-ratio:1;
  border-radius:16px;
  background:rgba(255,255,255,.48);
  border:1px solid rgba(21,21,26,.08);
  box-shadow:0 18px 42px -26px rgba(21,21,26,.46);
}

.app-row{
  min-height:58px;
  margin-top:14px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface);
  display:flex;
  align-items:center;
  gap:10px;
  text-align:left;
}

.app-row p{
  flex:1;
  min-width:0;
  color:var(--ink);
  font-size:.98rem;
  font-weight:720;
  line-height:1.25;
}

.eth-chip{
  flex:none;
  display:inline-flex;
  align-items:center;
  gap:7px;
  height:34px;
  padding:0 10px 0 7px;
  color:var(--ink);
  background:var(--surface-soft);
  border:1px solid var(--line);
  border-radius:999px;
  font-size:.84rem;
  font-weight:760;
}

.eth-chip img{
  width:22px;
  height:22px;
  border-radius:50%;
}

.toggle{
  flex:none;
  width:38px;
  height:22px;
  padding:2px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:var(--surface-soft);
  cursor:pointer;
  transition:background .16s ease, border-color .16s ease;
}

.toggle span{
  display:block;
  width:16px;
  height:16px;
  border-radius:50%;
  background:#FFFFFF;
  box-shadow:0 1px 3px rgba(21,21,26,.22);
  transition:transform .18s ease;
}

.toggle[aria-pressed="true"]{
  background:var(--accent);
  border-color:var(--accent);
}

.toggle[aria-pressed="true"] span{transform:translateX(16px)}

.primary{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:54px;
  width:100%;
  margin-top:14px;
  color:var(--accent-ink);
  background:var(--accent);
  border:1px solid var(--accent);
  border-radius:16px;
  font-size:1.02rem;
  font-weight:820;
  box-shadow:0 18px 34px -22px rgba(99,102,241,.86);
  transition:transform .14s ease, box-shadow .16s ease, filter .16s ease;
}

.primary:hover{
  transform:translateY(-1px);
  filter:saturate(1.04);
  box-shadow:0 22px 40px -23px rgba(99,102,241,.92);
}

.foot{
  padding:12px 24px 22px;
  color:var(--faint);
  text-align:center;
  font-size:.86rem;
  font-weight:620;
}

@media (max-width:720px){
  body{overflow:hidden}
  .topbar{
    width:min(100% - 32px, var(--max));
    padding:14px 0 8px;
    gap:12px;
  }
  .nav{display:none}
  .brand{font-size:.96rem}
  .ghost{
    min-height:36px;
    padding:0 14px;
    font-size:.88rem;
  }
  .stage{
    width:min(100% - 32px, var(--max));
    justify-content:start;
    padding-top:22px;
  }
  h1{
    font-size:3.05rem;
    line-height:1;
  }
  .sub{
    margin-top:12px;
    font-size:1rem;
    line-height:1.48;
  }
  .app-card{
    width:min(100%, 356px);
    margin-top:20px;
    padding:14px;
    border-radius:20px;
  }
  .nft-tile{
    max-height:228px;
    border-radius:15px;
  }
  .app-row{
    min-height:54px;
    margin-top:12px;
    padding:9px 10px;
    gap:8px;
    border-radius:14px;
  }
  .app-row p{font-size:.92rem}
  .eth-chip{
    height:31px;
    padding:0 8px 0 6px;
    gap:5px;
    font-size:.8rem;
  }
  .toggle{
    width:36px;
    height:21px;
  }
  .toggle span{
    width:15px;
    height:15px;
  }
  .toggle[aria-pressed="true"] span{transform:translateX(15px)}
  .primary{
    min-height:50px;
    margin-top:12px;
    border-radius:14px;
  }
  .foot{
    padding:8px 20px 14px;
    font-size:.82rem;
  }
}

@media (max-width:390px){
  .topbar{width:calc(100% - 24px)}
  .stage{width:calc(100% - 24px);padding-top:18px}
  h1{font-size:2.7rem}
  .sub{font-size:.96rem;line-height:1.42}
  .app-card{margin-top:16px}
  .nft-tile{max-height:204px}
  .app-row p{font-size:.88rem}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>NFT Platforms</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">NFT Platforms</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">NFT Platforms &mdash; 2026</footer>
</body>
</html>
